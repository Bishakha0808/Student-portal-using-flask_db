<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Profile – Student Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary shadow-sm">
  <div class="container">
    <span class="navbar-brand fw-bold fs-5">&#127979; Student Portal</span>
    <div class="d-flex align-items-center gap-3">
      <span class="text-white small">Welcome, <strong>{{ session.username }}</strong></span>
      <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center"
     style="min-height: calc(100vh - 56px);">
  <div class="card shadow-lg p-4" style="width:460px;">

    <h4 class="fw-bold text-primary mb-1">&#9998; Update Email</h4>
    <p class="text-muted small mb-4">Change your registered email address</p>

    <form method="post" novalidate>
      <div class="mb-4">
        <label class="form-label fw-semibold">New Email Address</label>
        <input type="email" name="email" class="form-control"
               value="{{ current_email }}" placeholder="Enter new email" required>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/dashboard" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
